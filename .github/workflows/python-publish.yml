name: Upload Python Package

on:
  release:
    types: [created]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      python-version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Extract Python version info
        id: extract
        run: |
          PYTHON_CODE=$(cat <<EOF
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
              req = data['project']['requires-python'].replace('>=', '').strip()
              print(f"version={req}")
          EOF
          )
          python3 -c "$PYTHON_CODE" >> "$GITHUB_OUTPUT"

  update_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new-sha: ${{ steps.get-sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set Release version
        run: uv version ${{ github.event.release.tag_name }}

      - name: Commit and push changes
        id: get-sha
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ github.event.release.tag_name }}"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: [setup, update_version]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ needs.setup.outputs.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Build package
      run: uv build

#    - name: Publish package distributions to PyPI
#      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Build and publish
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: twine upload dist/*
